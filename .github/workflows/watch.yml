name: Suite Essentials Watch

on:
  schedule:
    # Every 5 minutes (GitHub's minimum). Scheduled runs may be delayed/batched under load.
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      send_test:
        description: 'Send a test alert instead of scanning'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: suite-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run watcher
        env:
          # Override the baked-in default by setting an NTFY_TOPIC repo secret.
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          SEND_TEST: ${{ inputs.send_test == true && '1' || '' }}
        run: node monitor.js

      - name: Persist alert state
        if: ${{ inputs.send_test != true }}
        run: |
          if ! git diff --quiet -- state.json; then
            git config user.name 'suite-watch-bot'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add state.json
            git commit -m 'chore: update watch state [skip ci]'
            git push
          else
            echo 'No state change.'
          fi
